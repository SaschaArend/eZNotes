<!doctype html>
<html lang="de">

<head>
  <meta charset="utf-8" />
  <title>eZNotes</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    :root {
      --bg-color: #f8fafc;
      --card-bg: #ffffff;
      --text-main: #0f172a;
      --text-muted: #64748b;
      --primary: #4f46e5;
      --primary-gradient: linear-gradient(135deg, #4f46e5 0%, #6366f1 100%);
      --hover-bg: #f1f5f9;
      --border-color: #e2e8f0;
      --input-bg: #ffffff;
      --radius: 12px;
      --shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1);
    }


    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      width: 320px;
      background-color: var(--bg-color);
      color: var(--text-main);
      transition: background-color 0.3s, color 0.3s;
      overflow: hidden;
    }

    .container {
      padding: 16px;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border-color);
    }

    h4 {
      font-size: 16px;
      font-weight: 800;
      background: var(--primary-gradient);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.02em;
    }

    .section {
      margin-bottom: 16px;
    }

    .section-title {
      font-size: 9px;
      font-weight: 800;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 10px;
    }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: var(--radius);
      padding: 12px;
      box-shadow: var(--shadow);
    }

    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
      gap: 12px;
    }

    .row:last-child {
      margin-bottom: 0;
    }

    label {
      font-size: 12px;
      font-weight: 500;
    }

    /* Toggle Switch Compact */
    .toggle-switch {
      position: relative;
      display: inline-block;
      width: 36px;
      height: 20px;
    }

    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: var(--border-color);
      transition: .3s;
      border-radius: 20px;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 14px;
      width: 14px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: .3s;
      border-radius: 50%;
    }

    input:checked+.slider {
      background: var(--primary-gradient);
    }

    input:checked+.slider:before {
      transform: translateX(16px);
    }

    /* Buttons Compact */
    button {
      padding: 8px 12px;
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      color: var(--text-main);
      border-radius: 8px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      font-family: inherit;
    }

    button:hover {
      background: var(--hover-bg);
      border-color: var(--primary);
    }

    button.primary-btn {
      background: var(--primary-gradient);
      color: white;
      border: none;
      box-shadow: 0 4px 8px rgba(79, 70, 229, 0.2);
    }

    button.primary-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 12px rgba(79, 70, 229, 0.3);
    }

    .icon-btn {
      padding: 6px;
      min-width: 32px;
    }


    .footer {
      padding: 12px;
      background: var(--hover-bg);
      text-align: center;
      border-top: 1px solid var(--border-color);
    }

    small {
      color: var(--text-muted);
      font-size: 10px;
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); }
      70% { box-shadow: 0 0 0 6px rgba(16, 185, 129, 0); }
      100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
    }
  </style>
</head>

<body>
  <div class="container">

    <div class="header">
      <img src="../assets/logo.png" alt="eZNotes" style="height: 24px; width: auto; display: block;">
      <div style="display: flex; align-items: center; gap: 8px;">
        <button id="btnLibrary" class="icon-btn" title="Bibliothek öffnen">
          📚
        </button>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Dokumentation Session</div>
      <div class="card">
        <div class="row" style="margin-bottom: 0;">
          <div style="display: flex; flex-direction: column;">
            <span id="sessionStatus" style="font-weight: 700; font-size: 12px; color: var(--text-muted);">Inaktiv</span>
            <span id="sessionCount" style="font-size: 10px; color: var(--text-muted);">0 Schritte</span>
          </div>
          <div style="display: flex; gap: 6px;">
            <button id="toggleSession" class="primary-btn" style="min-width: 70px;">Start</button>
            <button id="pauseSession" style="display: none; min-width: 70px;">Pause</button>
          </div>
        </div>

        <div id="sessionControls"
          style="margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border-color);">
          <button id="openEditor" style="width: 100%;">📝 Editor & Export</button>
        </div>
      </div>
    </div>

    <div class="section" style="margin-bottom: 0;">
      <div class="section-title">Einstellungen</div>
      <div class="card" style="padding: 10px 12px;">
        <div class="row">
          <label>In Clipboard kopieren</label>
          <label class="toggle-switch">
            <input type="checkbox" id="copyOnClick">
            <span class="slider"></span>
          </label>
        </div>
        <div class="row">
          <label>Smart-Cropping (Fokus)</label>
          <label class="toggle-switch">
            <input type="checkbox" id="smartCrop">
            <span class="slider"></span>
          </label>
        </div>
        <div class="row">
          <label>Entwicklermodus</label>
          <label class="toggle-switch">
            <input type="checkbox" id="devMode">
            <span class="slider"></span>
          </label>
        </div>
      </div>
    </div>

  </div>

  <div id="updateBanner" style="display: none; margin: 10px 16px; padding: 8px 12px; background: #ecfdf5; border: 1px solid #a7f3d0; border-radius: 8px; font-size: 11px; color: #065f46; align-items: center; justify-content: space-between; box-shadow: 0 1px 2px rgba(0,0,0,0.05); animation: pulse 2s infinite;">
    <span>🔄 <b>Update verfügbar!</b> (v<span id="remoteVersionText"></span>)</span>
    <span style="font-weight: 700; cursor: pointer; text-decoration: underline;" id="btnUpdateInfo" title="Update-Anleitung anzeigen">Mehr Info</span>
  </div>

  <div class="footer">
    <small>eZNotes v2.5 • Sascha Arend <span id="unlockFeatures" style="cursor: pointer; margin-left: 6px; user-select: none;" title="Funktionen freischalten">🔒</span></small>
  </div>

  <script src="../js/popup.js"></script>
</body>

</html>
