<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eZNotes Editor</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        :root {
            --bg-color: #f8fafc;
            --sidebar-bg: #ffffff;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --border-color: #e2e8f0;
            --accent: #f1f5f9;
            --radius: 12px;
            --shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1), 0 1px 2px -1px rgb(0 0 0 / 0.1);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
        }

        body.dark-theme {
            --bg-color: #0f172a;
            --sidebar-bg: #1e293b;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --primary: #6366f1;
            --primary-hover: #818cf8;
            --border-color: #334155;
            --accent: #334155;
            --shadow: 0 1px 3px 0 rgb(0 0 0 / 0.3);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.4);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
            transition: background-color 0.3s, color 0.3s;
        }

        /* Sidebar (Step List) */
        .sidebar {
            width: 320px;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            box-shadow: var(--shadow);
            z-index: 10;
        }

        .sidebar-header {
            padding: 24px;
            border-bottom: 1px solid var(--border-color);
        }

        .sidebar-header h2 {
            margin: 0;
            font-size: 18px;
            font-weight: 700;
            color: var(--primary);
            letter-spacing: -0.01em;
        }

        .step-list {
            list-style: none;
            padding: 8px;
            margin: 0;
            overflow-y: auto;
            flex: 1;
        }

        .step-item {
            padding: 12px 16px;
            border-radius: var(--radius);
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            gap: 12px;
            align-items: flex-start;
            margin-bottom: 4px;
            border: 1px solid transparent;
        }

        .step-item:hover {
            background: var(--accent);
        }

        .step-item.active {
            background: var(--accent);
            border-color: var(--primary);
            box-shadow: var(--shadow);
        }

        .step-number {
            background: var(--primary);
            color: white;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 700;
            flex-shrink: 0;
            box-shadow: 0 2px 4px rgba(79, 70, 229, 0.2);
        }

        .step-info {
            overflow: hidden;
            flex: 1;
        }

        .step-title {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .step-desc {
            font-size: 11px;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .step-item.selected-for-merge {
            background: rgba(79, 70, 229, 0.1);
            border: 1px dashed var(--primary);
        }

        .step-item.sensitive {
            border-left: 4px solid #ef4444;
        }

        .step-item.chapter {
            background: var(--bg-color);
            margin: 16px 8px;
            font-weight: 700;
            border-left: 3px solid #64748b;
        }

        .step-item.textblock {
            border-left: 3px solid var(--primary);
        }

        /* Toolbar */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-color);
        }

        .toolbar {
            padding: 12px 24px;
            background: var(--sidebar-bg);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow);
            z-index: 5;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .btn-group-label {
            font-size: 10px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .btn-row {
            display: flex;
            gap: 6px;
        }

        button {
            background: var(--sidebar-bg);
            border: 1px solid var(--border-color);
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-main);
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        button:hover {
            background: var(--accent);
            border-color: var(--text-muted);
        }

        button.primary {
            background: var(--primary);
            color: white;
            border: none;
            padding: 8px 20px;
            box-shadow: 0 4px 6px -1px rgba(79, 70, 229, 0.3);
        }

        button.primary:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 6px 10px -1px rgba(79, 70, 229, 0.4);
        }

        /* Editor Area */
        .editor-area {
            flex: 1;
            padding: 32px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            overflow: auto;
        }

        .canvas-wrapper {
            background: var(--card-bg);
            box-shadow: var(--shadow-md);
            border-radius: var(--radius);
            padding: 0;
            position: relative;
            border: 1px solid var(--border-color);
            overflow: hidden;
        }

        canvas {
            display: block;
            max-width: 100%;
        }

        /* Meta Editor */
        .meta-editor {
            width: 320px;
            background: var(--sidebar-bg);
            border-left: 1px solid var(--border-color);
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            overflow-y: auto;
        }

        .form-group label {
            display: block;
            font-size: 11px;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 10px 14px;
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-main);
            font-family: inherit;
            font-size: 13px;
            transition: border-color 0.2s;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
        }

        /* Modal Redesign */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(8px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal {
            background: var(--card-bg);
            padding: 32px;
            border-radius: 24px;
            width: 560px;
            max-width: 90vw;
            box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.5);
            border: 1px solid var(--border-color);
        }

        .export-options {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-top: 24px;
        }

        .export-card {
            border: 1px solid var(--border-color);
            padding: 24px 16px;
            border-radius: 16px;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s;
            background: var(--bg-color);
        }

        .export-card:hover {
            border-color: var(--primary);
            transform: translateY(-4px);
            box-shadow: var(--shadow-md);
        }

        /* Rich Editor */
        .rich-editor-container {
            background: var(--card-bg);
            border-radius: 16px;
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border-color);
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
        }

        .rich-editor-toolbar {
            padding: 12px;
            border-bottom: 1px solid var(--border-color);
            background: var(--sidebar-bg);
            border-radius: 16px 16px 0 0;
            display: flex;
            gap: 8px;
        }

        .rich-editor-content {
            padding: 48px;
            min-height: 500px;
            outline: none;
            font-size: 16px;
            color: var(--text-main);
        }
    </style>
    </style>
</head>

<body>
    <div class="sidebar">
        <div class="sidebar-header">
            <div style="display: flex; flex-direction: column; gap: 16px;">
                <img src="../assets/logo.png" alt="eZNotes"
                    style="height: 32px; width: fit-content; display: block; margin-left: -4px;">
                <h2
                    style="margin: 0; font-size: 14px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em;">
                    Dokumentation</h2>
                <div class="sidebar-buttons" style="display: flex; gap: 8px; flex-wrap: wrap;">
                    <style>
                        .sidebar-header button {
                            padding: 6px 10px;
                            border-radius: 6px;
                            border: 1px solid #d1d5db;
                            background: white;
                            cursor: pointer;
                            font-size: 13px;
                            display: flex;
                            align-items: center;
                            gap: 4px;
                            transition: all 0.2s;
                        }

                        .sidebar-header button:hover {
                            border-color: var(--primary);
                            color: var(--primary);
                            background: #f5f3ff;
                        }
                    </style>
                    <button id="btnLibrary" title="Bibliothek öffnen"
                        style="background: var(--primary); color: white; border-color: var(--primary);">📚
                        Bibliothek</button>
                    <button id="btnAddChapter" title="Kapitel-Trenner hinzufügen">🔖</button>
                    <button id="btnAddTextBlock" title="Textblock hinzufügen">📝</button>
                    <button id="btnMerge" title="Markierte Schritte zusammenführen">🔗</button>
                    <button id="btnAddStep" title="Neuen Schritt hinzufügen (aus Zwischenablage oder Import)">➕</button>
                    <button id="btnBackup" title="Session sichern (.json)">💾</button>
                    <button id="btnRestore" title="Session laden">📁</button>
                    <input type="file" id="restoreFile" style="display: none;" accept=".json">
                    <input type="file" id="importImage" style="display: none;" accept="image/*">
                </div>
            </div>
        </div>
        <ul class="step-list" id="stepList">
            <!-- Steps generated by JS -->
        </ul>
    </div>

    <div class="main">
        <div class="toolbar">
            <div style="display: flex; gap: 32px; align-items: center;">
                <div class="btn-group">
                    <span class="btn-group-label">Bild</span>
                    <div class="btn-row">
                        <button id="btnCrop" title="Zuschneiden">✂️</button>
                        <button id="btnBlur" title="Verpixeln">💧</button>
                    </div>
                </div>

                <div class="btn-group">
                    <span class="btn-group-label">Marker</span>
                    <div class="btn-row">
                        <button id="btnSelect" title="Marker auswählen/verschieben">🖱️</button>
                        <button id="btnRect" title="Bereich markieren (Viereck)">⏹️</button>
                        <button id="btnArrow" title="Pfeil zeichnen">➡️</button>
                        <button id="btnResetMarker" title="Alle Marker entfernen" style="color: #ef4444;">🧹</button>
                    </div>
                </div>

                <div class="btn-group">
                    <span class="btn-group-label">Verlauf</span>
                    <div class="btn-row">
                        <button id="btnUndo" title="Rückgängig">↩️</button>
                        <button id="btnRedo" title="Wiederholen">↪️</button>
                    </div>
                </div>
            </div>

            <div style="display: flex; gap: 12px; align-items: center;">
                <button id="btnThemeToggle" title="Design umschalten"
                    style="font-size: 18px; padding: 6px 10px;">🌗</button>
                <div style="height: 24px; border-left: 1px solid var(--border-color); margin: 0 4px;"></div>
                <div class="btn-row">
                    <button id="btnRemoveStep" style="color: #ef4444; border-color: #fca5a5;"
                        title="Schritt löschen">🗑️</button>
                    <button id="btnQuickCopy" title="Bild kopieren">📋</button>
                    <button id="btnSaveLibrary" style="border-color: var(--primary); color: var(--primary);"
                        title="In Bibliothek speichern">📥 Archivieren</button>
                    <button class="primary" id="btnExport">Exportieren</button>
                </div>
            </div>
        </div>

        <div class="editor-area">
            <div class="canvas-wrapper" id="canvasWrapper">
                <div class="empty-state">
                    <p>Wähle einen Schritt aus der Liste</p>
                </div>
            </div>
        </div>
    </div>

    <div class="meta-editor">
        <div style="border-bottom: 1px solid var(--border-color); padding-bottom: 15px; margin-bottom: 5px;">
            <label style="font-weight: 700; color: var(--primary);">Session-Details</label>
            <div class="form-group" style="margin-top: 10px;">
                <label>Name der Dokumentation</label>
                <input type="text" id="documentTitleInput" placeholder="z.B. Prozess-Beschreibung">
            </div>
            <div class="form-group" style="margin-top: 10px;">
                <label>Dokument Version</label>
                <input type="text" id="sessionVersionInput" placeholder="z.B. 1.0.4">
            </div>
            <div class="form-group" style="margin-top: 10px;">
                <label>Tags (mit Komma trennen)</label>
                <input type="text" id="sessionTagsInput" placeholder="z.B. #ERP, #Handbuch">
            </div>
        </div>
        <div class="form-group">
            <label id="titleLabel">Titel des Schritts</label>
            <input type="text" id="stepTitleInput">
        </div>
        <div class="form-group">
            <label>Beschreibung</label>
            <div style="position: relative;">
                <textarea id="stepDescInput" placeholder="Was passiert hier?"></textarea>
            </div>
        </div>
        <div class="form-group">
            <label>Sessioncode</label>
            <input type="text" id="stepSessionInput" placeholder="z.B. SALES_ORDER_01">
        </div>
        <div class="form-group">
            <label>Tabellenfeld</label>
            <input type="text" id="stepFieldInput" placeholder="z.B. customer.name">
        </div>
    </div>

    <div class="modal-overlay" id="exportModal">
        <div class="modal">
            <h3>Dokument exportieren</h3>
            <div class="form-group">
                <label>Name der Dokumentation</label>
                <input type="text" id="exportTitleInput" placeholder="Meine Dokumentation" value="Dokumentation">
            </div>
            <div class="export-options">
                <div class="export-card" id="exportPDF">
                    <div class="icon">📄</div>
                    <div class="label">PDF</div>
                    <small>Ideal für Handbücher</small>
                </div>
                <div class="export-card" id="exportTour">
                    <div class="icon">🚀</div>
                    <div class="label">Vorschau</div>
                    <small>Browser-Vorschau</small>
                </div>
                <div class="export-card" id="downloadTour">
                    <div class="icon">💾</div>
                    <div class="label">Download</div>
                    <small>Offline (.html)</small>
                </div>
            </div>
            <div class="modal-footer">
                <button class="secondary-btn" onclick="document.getElementById('exportModal').style.display='none'">
                    Abbrechen
                </button>
            </div>
        </div>
    </div>

    <script src="../js/editor.js"></script>
</body>

</html>
