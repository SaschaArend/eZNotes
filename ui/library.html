<!doctype html>
<html lang="de">

<head>
    <meta charset="utf-8" />
    <title>eZNotes - Bibliothek</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        :root {
            --bg-color: #f8fafc;
            --sidebar-bg: #ffffff;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --border-color: #e2e8f0;
            --accent: #f1f5f9;
            --radius: 12px;
            --shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1), 0 1px 2px -1px rgb(0 0 0 / 0.1);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --primary-gradient: linear-gradient(135deg, #4f46e5 0%, #6366f1 100%);
        }


        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            transition: background-color 0.3s, color 0.3s;
        }

        header {
            padding: 20px 40px;
            background: var(--sidebar-bg);
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: var(--shadow);
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-area h1 {
            font-size: 20px;
            font-weight: 800;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.025em;
        }

        .actions-area {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .search-container {
            position: relative;
            width: 300px;
        }

        .search-container input {
            width: 100%;
            padding: 10px 16px 10px 40px;
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            color: var(--text-main);
            font-family: inherit;
            font-size: 14px;
            transition: all 0.2s;
        }

        .search-container input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        .search-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        .btn {
            padding: 10px 18px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: inherit;
        }

        .btn-primary {
            background: var(--primary-gradient);
            color: white;
            border: none;
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.2);
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(79, 70, 229, 0.3);
        }

        .btn-secondary {
            background: var(--card-bg);
            color: var(--text-main);
        }

        .btn-secondary:hover {
            border-color: var(--primary);
            color: var(--primary);
            background: var(--accent);
        }

        main {
            padding: 40px;
            max-width: 1300px;
            margin: 0 auto;
            width: 100%;
            flex: 1;
        }

        .filters {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 32px;
            color: var(--text-muted);
            font-size: 14px;
            font-weight: 500;
        }

        .filters select {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            padding: 6px 12px;
            border-radius: 8px;
        }

        .filters select:focus {
            outline: none;
            border-color: var(--primary);
        }

        /* Tag Cloud */
        .tag-cloud {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 32px;
        }

        .tag-chip {
            padding: 6px 14px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text-muted);
        }

        .tag-chip:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .tag-chip.active {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
        }

        .library-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
        }

        .session-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            padding: 24px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            gap: 16px;
            box-shadow: var(--shadow);
        }

        .session-card:hover {
            border-color: var(--primary);
            transform: translateY(-4px);
            box-shadow: var(--shadow-md);
        }

        .session-badge {
            position: absolute;
            top: 12px;
            right: 12px;
            background: var(--accent);
            color: var(--primary);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            border: 1px solid var(--border-color);
        }

        .session-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--text-main);
        }

        .session-meta {
            color: var(--text-muted);
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .session-preview {
            height: 140px;
            background: var(--bg-color);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            font-size: 12px;
            background-size: cover;
            background-position: center;
            border: 1px solid var(--border-color);
        }

        .card-actions {
            display: flex;
            gap: 12px;
            margin-top: 8px;
        }

        .action-btn {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid var(--border-color);
            background: transparent;
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .action-btn:hover {
            background: var(--accent);
            border-color: var(--primary);
            color: var(--primary);
        }

        .action-btn.primary {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
        }

        .action-btn.primary:hover {
            background: var(--primary-hover);
        }

        .action-btn.danger {
            color: #ef4444;
        }

        .action-btn.danger:hover {
            background: #fee2e2;
            border-color: #ef4444;
        }

        /* Checkbox Style */
        .card-checkbox {
            position: absolute;
            top: 12px;
            left: 12px;
            width: 20px;
            height: 20px;
            cursor: pointer;
            z-index: 10;
            accent-color: var(--primary);
        }

        .session-card.selected {
            border-color: var(--primary);
            background: var(--accent);
            box-shadow: 0 0 0 2px var(--primary);
        }

        /* Modal Styles Refined */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(8px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal {
            background: var(--sidebar-bg);
            width: 90%;
            max-width: 600px;
            max-height: 85vh;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }

        .modal-header {
            padding: 24px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-body {
            padding: 24px;
            overflow-y: auto;
            flex: 1;
        }


        #toast {
            position: fixed;
            bottom: 32px;
            right: 32px;
            background: var(--primary-gradient);
            color: white;
            padding: 16px 24px;
            border-radius: 12px;
            font-weight: 600;
            box-shadow: 0 10px 25px rgba(79, 70, 229, 0.4);
            transform: translateY(150px);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 2000;
        }

        #toast.show {
            transform: translateY(0);
        }

        .selection-toolbar {
            position: fixed;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--sidebar-bg);
            border: 2px solid var(--primary);
            padding: 16px 24px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            gap: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
            z-index: 500;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .selection-toolbar.show {
            transform: translateX(-50%) translateY(0);
        }

        .selection-count {
            font-weight: 700;
            color: var(--primary);
            padding-right: 16px;
            border-right: 1px solid var(--border-color);
        }

        .history-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .history-item {
            display: flex;
            gap: 16px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border-color);
            position: relative;
        }

        .history-item:last-child {
            border-bottom: none;
        }

        .history-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--primary);
            flex-shrink: 0;
            margin-top: 4px;
        }

        .history-content {
            flex: 1;
        }

        .history-time {
            font-size: 11px;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        .history-action {
            font-size: 14px;
            color: var(--text-main);
            font-weight: 500;
        }

        .empty-state {
            grid-column: 1 / -1;
            padding: 80px 40px;
            text-align: center;
            color: var(--text-muted);
        }

        .empty-state h2 {
            color: var(--text-main);
            margin-bottom: 12px;
        }
    </style>
</head>

<body>
    <header>
        <div class="logo-area">
            <img src="../assets/logo.png" alt="eZNotes" style="height: 32px; width: auto; display: block;">
        </div>
        <div class="actions-area">
            <div class="search-container">
                <span class="search-icon">🔍</span>
                <input type="text" id="searchInput" placeholder="Dokumentation suchen...">
            </div>
            <button class="btn btn-secondary" id="btnSetRoot">
                <span>📁</span> Stammverzeichnis wählen
            </button>
            <button class="btn btn-primary" id="btnClose">
                <span>✖</span> Schließen
            </button>
        </div>
    </header>

    <main>
        <div class="filters">
            <span>Sortieren nach:</span>
            <select id="sortSelect">
                <option value="date_desc">Datum (Neu zuerst)</option>
                <option value="date_asc">Datum (Alt zuerst)</option>
                <option value="name_asc">Name (A-Z)</option>
                <option value="steps_desc">Anzahl Schritte</option>
            </select>
            <span id="statsLabel" style="margin-left: auto;">Geladen: 0 Dokumentationen</span>
        </div>

        <div id="tagCloud" class="tag-cloud">
            <!-- Tags will be injected here -->
        </div>

        <div id="directoryStatus"
            style="margin-bottom: 20px; font-size: 13px; color: var(--text-muted); display: none; align-items: center; gap: 8px; background: rgba(99,102,241,0.1); padding: 10px 16px; border-radius: 12px; border: 1px solid rgba(99,102,241,0.2);">
            <span style="font-size: 16px;">📂</span>
            <span id="directoryPathText">Stammverzeichnis: Nicht gewählt</span>
            <button class="btn-secondary" id="btnSyncDir"
                style="padding: 2px 8px; font-size: 11px; margin-left: auto; border-radius: 4px;">Aktualisieren</button>
        </div>

        <div id="libraryGrid" class="library-grid">
            <!-- Cards will be injected here -->
            <div class="empty-state">
                <h2>Noch keine Dokumentationen vorhanden</h2>
                <p>Verwende den Editor, um Sessions zu speichern, oder importiere eine JSON-Datei.</p>
            </div>
        </div>
    </main>

    <!-- History Modal -->
    <div class="modal-overlay" id="historyModal">
        <div class="modal">
            <div class="modal-header">
                <h3 id="historyTitle" style="margin: 0; color: var(--primary);">Versions-Historie</h3>
                <div style="display: flex; gap: 10px; align-items: center;">
                    <button class="action-btn danger" id="btnClearHistory"
                        style="padding: 5px 12px; font-size: 11px;">🗑️ Historie leeren</button>
                    <button class="action-btn" id="closeHistory" style="padding: 5px 10px;">✖</button>
                </div>
            </div>
            <div class="modal-body">
                <div id="historyList" class="history-list">
                    <!-- History items injected here -->
                </div>
            </div>
        </div>
    </div>

    <div id="selectionToolbar" class="selection-toolbar">
        <div class="selection-count"><span id="selectedCountText">0</span> gewählt</div>
        <button class="btn btn-primary" id="btnBulkMerge">🔗 Zusammenführen</button>
        <button class="btn btn-secondary" id="btnCancelSelection" style="border: none;">Abbrechen</button>
    </div>

    <div id="toast">Aktion erfolgreich!</div>

    <script src="../js/library.js"></script>
</body>

</html>
